services:
  app:
    build:
      context: ./GoldenCrown
      dockerfile: Dockerfile
    ports:
      - "5087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=GoldenCrown;User Id=sa;Password=MsSql_Pass123!;TrustServerCertificate=True
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=MsSql_Pass123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_goldencrown_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "MsSql_Pass123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Pg_Pass123!
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_goldencrown_data:/var/lib/postgresql/data

volumes:
  mssql_goldencrown_data:
  pg_goldencrown_data:
